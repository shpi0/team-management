<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Balancer — балансировка команд кластера</title>
<style>
  :root{
    --bg:#0f1420; --panel:#171e2e; --panel2:#1d2638; --line:#2a3650;
    --text:#e6ecf5; --muted:#8a97ad; --accent:#4f8cff; --accent2:#6ee7b7;
    --good:#2fbf71; --warn:#e0a516; --bad:#e5484d;
    --staff:#3b82f6; --contractor:#a855f7;
    --shadow:0 6px 20px rgba(0,0,0,.35);
    --radius:12px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:linear-gradient(180deg,#0d121d,#0f1420 200px);
    color:var(--text);
    font:14px/1.45 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  button{font:inherit;cursor:pointer}
  .btn{
    background:var(--panel2);color:var(--text);border:1px solid var(--line);
    border-radius:8px;padding:7px 12px;display:inline-flex;align-items:center;gap:6px;
    transition:.12s;white-space:nowrap;
  }
  .btn:hover{border-color:var(--accent);background:#26324a}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.sm{padding:4px 8px;font-size:12px}
  .icon{font-size:15px;line-height:1}

  /* ---------- Top bar ---------- */
  header{
    position:sticky;top:0;z-index:30;background:rgba(15,20,32,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
  }
  .bar{display:flex;align-items:center;gap:10px;padding:10px 16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;margin-right:6px}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--accent2);box-shadow:0 0 12px var(--accent2)}
  .proj{background:transparent;border:1px solid transparent;color:var(--text);font:inherit;
    font-weight:600;border-radius:6px;padding:4px 8px;min-width:160px}
  .proj:hover,.proj:focus{border-color:var(--line);outline:none}
  .spacer{flex:1}
  .sep{width:1px;height:24px;background:var(--line);margin:0 2px}

  /* ---------- Toolbar 2 (filters/analytics) ---------- */
  .subbar{display:flex;align-items:center;gap:10px;padding:8px 16px;flex-wrap:wrap;border-top:1px solid var(--line)}
  .search{display:flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);
    border-radius:8px;padding:4px 10px;min-width:200px}
  .search input{background:transparent;border:0;color:var(--text);font:inherit;outline:none;width:100%}
  select.f,input.f{background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:6px 8px;font:inherit;min-width:0;max-width:100%}
  .chip-toggle{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;cursor:pointer;user-select:none}

  /* ---------- Analytics ---------- */
  .analytics{margin:0 16px 4px;border:1px solid var(--line);border-radius:var(--radius);
    background:var(--panel);overflow:hidden}
  .analytics summary{list-style:none;cursor:pointer;padding:10px 14px;font-weight:600;display:flex;align-items:center;gap:8px}
  .analytics summary::-webkit-details-marker{display:none}
  .analytics .body{padding:4px 14px 14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
  .stat{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:11px 13px}
  .stat .k{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  .stat .v{font-size:22px;font-weight:700;margin-top:3px}
  .stat .sub{color:var(--muted);font-size:12px;margin-top:2px}
  .barrow{display:flex;align-items:center;gap:8px;margin-top:6px}
  .barrow .lbl{width:64px;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .barrow .track{flex:1;height:7px;background:#0e1626;border-radius:4px;overflow:hidden}
  .barrow .fill{display:block;height:100%;min-width:2px;border-radius:4px}

  /* ---------- Board ---------- */
  main{padding:12px 16px 60px}
  .board{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;align-items:start}
  .team{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    display:flex;flex-direction:column;min-height:120px;box-shadow:var(--shadow);transition:.12s}
  .team.dragover{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent) inset}
  .team.team-dragging{opacity:.45}
  .team-grip{cursor:grab;color:var(--muted);font-size:14px;line-height:1;padding:0 2px;user-select:none;flex:none}
  .team-grip:hover{color:var(--text)}
  .team-grip:active{cursor:grabbing}
  .team h2{font-size:15px;margin:0;display:flex;align-items:center;gap:8px;flex:1}
  .team h2 input{background:transparent;border:1px solid transparent;color:var(--text);font:inherit;
    font-weight:700;border-radius:5px;padding:2px 5px;width:100%}
  .team h2 input:hover,.team h2 input:focus{border-color:var(--line);outline:none}
  .thead{padding:11px 12px 8px;border-bottom:1px solid var(--line)}
  .thead .top{display:flex;align-items:center;gap:6px}
  .team-color{width:10px;height:10px;border-radius:3px;flex-shrink:0}
  .metrics{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
  .metric{flex:1;min-width:78px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;
    padding:6px 8px;position:relative;overflow:hidden}
  .metric .ml{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.03em}
  .metric .mv{font-size:17px;font-weight:700;margin-top:1px;display:flex;align-items:center;gap:6px}
  .metric .flagdot{width:9px;height:9px;border-radius:50%;display:inline-block}
  .metric .accentbar{position:absolute;left:0;bottom:0;height:3px;width:100%}

  .members{padding:8px 10px 12px;flex:1;display:flex;flex-direction:column;gap:2px;min-height:54px}
  .role-group{margin-top:6px}
  .role-group:first-child{margin-top:0}
  .role-h{display:flex;align-items:center;gap:7px;color:var(--muted);font-size:11px;font-weight:700;
    text-transform:uppercase;letter-spacing:.05em;padding:3px 2px}
  .role-h .count{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:0 7px;font-size:11px}
  .role-h .addrole{margin-left:auto;opacity:0;transition:.1s}
  .role-group:hover .addrole{opacity:1}

  .chip{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);
    border-radius:9px;padding:6px 8px;cursor:grab;transition:.1s;position:relative}
  .chip:hover{border-color:#3a496a;background:#222d44}
  .chip.dragging{opacity:.4}
  .chip .grade{flex-shrink:0;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;
    justify-content:center;font-weight:700;font-size:12px;background:var(--staff);color:#fff}
  .chip.contractor .grade{background:var(--contractor)}
  .chip .nm{flex:1;min-width:0}
  .chip .nm .name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chip .nm .meta{color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chip .grade.masked{font-size:13px;letter-spacing:1px}
  .chip .tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
  .tag-pill{font-size:10px;font-weight:600;line-height:1.3;background:#0e1626;border:1px solid var(--line);
    border-radius:5px;padding:0 5px;color:#bcd0ff;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis}
  .chip .fte{font-size:10px;font-weight:700;background:#0e1626;border:1px solid var(--line);
    border-radius:5px;padding:1px 5px;color:var(--accent2)}
  .chip .edit{opacity:0;transition:.1s;color:var(--muted);background:none;border:0;padding:2px 4px}
  .chip:hover .edit{opacity:1}
  .chip .edit:hover{color:var(--text)}
  .chip.vacancy{border-style:dashed;border-color:#46557a;background:#131a28}
  .chip.vacancy .grade{opacity:.85}
  .vac-name{font-weight:700;color:var(--muted);font-style:italic;letter-spacing:.02em}
  .pos-chips{display:flex;flex-wrap:nowrap;align-items:center;gap:4px;margin-top:3px;min-width:0;max-width:100%}
  .pos-chip{font-size:10px;font-weight:600;line-height:1.3;border-radius:5px;padding:0 5px;white-space:nowrap;
    flex:0 1 auto;min-width:0;width:fit-content;max-width:100%;overflow:hidden;text-overflow:ellipsis}
  .pos-chip.proj{background:rgba(79,140,255,.16);color:#bcd0ff;border:1px solid rgba(79,140,255,.5)}
  .pos-chip.temp{background:rgba(224,165,22,.16);color:#f4d98a;border:1px solid rgba(224,165,22,.5);flex:0 0 auto}
  .chip.dim{opacity:.25;filter:grayscale(.6)}
  .chip.hit{box-shadow:0 0 0 2px var(--warn)}
  .chip.moved-in{box-shadow:0 0 0 2px var(--good)}

  .badge{font-size:10px;font-weight:700;border-radius:5px;padding:1px 5px}
  .badge.contr{background:rgba(168,85,247,.18);color:#d6b4ff;border:1px solid rgba(168,85,247,.5)}

  .tfoot{padding:8px 10px;border-top:1px solid var(--line)}
  .empty-team{color:var(--muted);font-size:12px;text-align:center;padding:14px 6px;border:1px dashed var(--line);border-radius:8px;margin:6px}

  .vac-strip{font-size:11px;color:#cdb37a;padding:4px 12px 0}
  .vac-strip b{color:#f4d98a}
  /* diff strip for compare */
  .diff-strip{font-size:11px;color:var(--muted);padding:2px 12px 0}
  .delta.up{color:var(--good)} .delta.down{color:var(--bad)}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(5,8,14,.6);backdrop-filter:blur(3px);
    display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow:auto}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:100%;max-width:520px;
    box-shadow:var(--shadow);animation:pop .12s ease-out}
  .modal.wide{max-width:720px}
  @keyframes pop{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}
  .modal h3{margin:0;padding:16px 18px;border-bottom:1px solid var(--line);font-size:16px;display:flex;align-items:center;gap:8px}
  .modal .content{padding:16px 18px;display:flex;flex-direction:column;gap:14px;max-height:64vh;overflow-y:auto;overflow-x:hidden;min-width:0}
  .modal .foot{padding:13px 18px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
  .field{display:flex;flex-direction:column;gap:5px;min-width:0}
  .field label{color:var(--muted);font-size:12px;font-weight:600}
  .field input,.field select,.field textarea{background:var(--panel2);border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:8px 10px;font:inherit;width:100%;min-width:0;max-width:100%}
  .field textarea{resize:vertical;min-height:38px}
  .vac-check{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);
    border-radius:8px;padding:9px 11px;font-size:13px;color:var(--text);cursor:pointer}
  .vac-check input{width:16px;height:16px;flex:none}
  .row{display:flex;gap:12px}.row>*{flex:1;min-width:0}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{background:var(--panel2);border:0;padding:8px 14px;color:var(--muted)}
  .seg button.on{background:var(--accent);color:#fff}
  .alloc-row{display:flex;gap:8px;align-items:center}
  .alloc-row select{flex:1;min-width:0}
  .alloc-row input{width:80px;flex:none}
  .listmgr{display:flex;flex-direction:column;gap:6px;min-width:0}
  .listmgr .item{display:flex;gap:8px;align-items:center;background:var(--panel2);border:1px solid var(--line);
    border-radius:8px;padding:6px 8px;min-width:0}
  .listmgr .item input{flex:1;min-width:0;width:auto;background:transparent;border:0;color:var(--text);font:inherit;outline:none}
  .listmgr .item input[type=color]{flex:none}
  .listmgr .item .btn{flex:none}
  .hint{color:var(--muted);font-size:12px}
  .snap-item{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--line);
    border-radius:9px;padding:9px 11px}
  .snap-item.baseline{border-color:var(--accent)}
  .snap-item .si-main{flex:1}
  .snap-item .si-main .nm{font-weight:600}
  .snap-item .si-main .dt{color:var(--muted);font-size:11px}
  .tag{font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px;background:var(--accent);color:#fff}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel2);
    border:1px solid var(--line);border-radius:10px;padding:10px 16px;box-shadow:var(--shadow);z-index:80;
    animation:pop .12s}
  kbd{background:var(--panel2);border:1px solid var(--line);border-radius:4px;padding:0 5px;font-size:11px}

  /* ---------- Print ---------- */
  @media print{
    body{background:#fff;color:#111}
    header,.subbar,.analytics summary .icon,.chip .edit,.role-h .addrole,.tfoot,.toast,.overlay{display:none !important}
    .analytics{break-inside:avoid;border-color:#ccc}
    .board{grid-template-columns:repeat(3,1fr)}
    .team{box-shadow:none;border-color:#bbb;break-inside:avoid}
    .panel,.team,.metric,.chip{background:#fff !important}
    *{color:#111 !important}
    .chip,.metric{border-color:#ddd}
  }
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand"><span class="dot"></span>Team&nbsp;Balancer</div>
    <input class="proj" id="projName" placeholder="Название кластера" title="Название проекта/кластера">
    <span class="sep"></span>
    <button class="btn primary" id="addPerson"><span class="icon">＋</span>Сотрудник</button>
    <button class="btn" id="addTeam"><span class="icon">▦</span>Команда</button>
    <span class="sep"></span>
    <button class="btn ghost" id="undo" title="Отменить (Ctrl+Z)"><span class="icon">↶</span></button>
    <button class="btn ghost" id="redo" title="Повторить (Ctrl+Y)"><span class="icon">↷</span></button>
    <span class="sep"></span>
    <button class="btn ghost" id="gradeEye" title="Скрыть/показать грейды"><span class="icon">👁</span></button>
    <span class="spacer"></span>
    <button class="btn" id="snapBtn"><span class="icon">⧉</span>Снимки</button>
    <button class="btn" id="settingsBtn"><span class="icon">⚙</span>Справочники</button>
    <span class="sep"></span>
    <button class="btn" id="saveBtn" title="Скачать JSON"><span class="icon">⬇</span>JSON</button>
    <button class="btn" id="loadBtn" title="Загрузить JSON"><span class="icon">⬆</span></button>
    <button class="btn" id="pngBtn" title="Экспорт PNG"><span class="icon">🖼</span></button>
    <button class="btn" id="printBtn" title="Печать / PDF"><span class="icon">🖨</span></button>
    <input type="file" id="fileInput" accept="application/json" hidden>
  </div>
  <div class="subbar">
    <div class="search"><span class="icon" style="color:var(--muted)">⌕</span>
      <input id="searchInput" placeholder="Поиск: имя, роль, проект, тег…"></div>
    <select class="f" id="filterRole"><option value="">Все роли</option></select>
    <select class="f" id="filterLoc"><option value="">Все локации</option></select>
    <select class="f" id="filterStatus">
      <option value="">Все</option>
      <option value="staff">Только штат</option>
      <option value="contractor">Только подрядчики</option>
      <option value="vacancy">Только ставки</option>
    </select>
    <label class="chip-toggle"><input type="checkbox" id="filterMode"> скрывать несовпадающих</label>
    <span class="spacer"></span>
    <label class="chip-toggle" id="compareWrap" style="display:none">
      <input type="checkbox" id="compareToggle"> сравнить с базой: <b id="baselineName" style="color:var(--text)"></b></label>
  </div>
</header>

<details class="analytics" id="analytics" open>
  <summary><span class="icon">📊</span>Сводная аналитика кластера <span class="hint" style="margin-left:auto" id="anHint"></span></summary>
  <div class="body" id="analyticsBody"></div>
</details>

<main><div class="board" id="board"></div></main>

<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script>
"use strict";
/* ============================================================ *
 *  Team Balancer — однофайловое приложение, без зависимостей.
 *  Хранение: localStorage + экспорт/импорт JSON.
 * ============================================================ */

const LS_KEY = "team-balancer-v1";
const GRADE_MIN = 7, GRADE_MAX = 12;
// Пороги выброса по модулю z-оценки (сравнение команд между собой)
const Z_WARN = 0.85, Z_BAD = 1.6;
// Лимиты тегов (защита плотности доски)
const MAX_TAG_LEN = 24, MAX_TAGS = 12;
const normTags = (arr)=> (Array.isArray(arr)?arr:[])
  .filter(t=>typeof t==="string")
  .map(t=>t.trim().slice(0,MAX_TAG_LEN))
  .filter(Boolean)
  .filter((t,i,a)=>a.indexOf(t)===i)
  .slice(0,MAX_TAGS);

/* ---------- state ---------- */
let state = null;          // {meta, roles, locations, teams, people}
let snapshots = [];        // [{id,name,createdAt,doc}]
let baselineId = null;
let ui = { search:"", fRole:"", fLoc:"", fStatus:"", fHide:false, compare:false, hideGrades:false };
let history = [], hpos = -1;   // undo/redo стек документов
let uidCounter = 1;

const uid = (p) => `${p}${Date.now().toString(36)}${(uidCounter++).toString(36)}`;
// цвет квадрата грейда по роли: явный из справочника, иначе детерминированный из палитры по индексу роли
const ROLE_PALETTE = ["#3b82f6","#10b981","#f59e0b","#a855f7","#ef4444","#06b6d4","#ec4899","#84cc16","#f97316","#14b8a6"];
function roleColor(role){
  const rc = state.roleColors||{};
  if(/^#[0-9a-fA-F]{6}$/.test(rc[role]||"")) return rc[role];
  const i = state.roles.indexOf(role);
  return i>=0 ? ROLE_PALETTE[i%ROLE_PALETTE.length] : "var(--staff)";
}
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const clone = (o)=>JSON.parse(JSON.stringify(o));
const esc = (s)=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* ---------- demo seed ---------- */
function seed(){
  const roles = ["Backend","Frontend","SA","BA","QA","AT","Data Engineer"];
  const locations = ["Москва","Санкт-Петербург","Минск","Ереван","Тбилиси"];
  const T = (name,color)=>({id:uid("t"),name,color});
  const teams = [
    T("Платёжный шлюз","#4f8cff"), T("Карты и счета","#6ee7b7"),
    T("Антифрод","#e0a516"), T("Мобильный банк","#a855f7"),
  ];
  const projects = ["Платежи 2.0","Открытие счетов","ML-скоринг"];
  const P=(name,role,grade,contractor,loc,allocs,tags,comment,project,expiry)=>({
    id:uid("p"),name,role,grade:contractor?null:grade,isContractor:contractor,isVacancy:false,location:loc,
    tags:tags||[],comment:comment||"",project:project||"",expiry:expiry||"",
    allocations:allocs.map(a=>({teamId:teams[a[0]].id,fte:a[1]}))
  });
  // ставка (вакансия): без имени, штатная; опционально проект и срок действия
  const V=(role,grade,allocs,project,expiry,tags)=>({
    id:uid("p"),name:"",role,grade,isContractor:false,isVacancy:true,location:"",
    tags:tags||[],comment:"",project:project||"",expiry:expiry||"",
    allocations:allocs.map(a=>({teamId:teams[a[0]].id,fte:a[1]}))
  });
  const people = [
    P("Алексей Орлов","Backend",11,false,"Москва",[[0,1]],["Kafka","Tech Lead"],"Тимлид направления, держит на себе платёжное ядро."),
    P("Дмитрий Сухов","Backend",9,false,"Минск",[[0,0.5],[2,0.5]],["Go"]),
    P("Игорь Лапин","Frontend",8,false,"Ереван",[[0,1]],["React"]),
    P("Сергей Котов","QA",8,false,"Санкт-Петербург",[[0,1]],["Automation"]),
    P("External: J. Doe","Backend",null,true,"Тбилиси",[[0,1]]),
    V("QA",9,[[0,1]],"","",["Automation"]),                    // обычная ставка
    P("Мария Зуева","SA",12,false,"Москва",[[1,0.5],[3,0.5]],["Архитектура","ML"]),
    P("Павел Гром","Backend",10,false,"Москва",[[1,1]],["Java","Payments"],"","Открытие счетов","2026-09-30"),
    P("Ольга Тимина","BA",9,false,"Минск",[[1,1]]),
    P("External: A. Smith","Frontend",null,true,"Ереван",[[1,1]],["Vue"]),
    V("Backend",10,[[1,1]],"Открытие счетов","",["Java"]),     // ставка под проект

/* ============================================================ *
 *  Validation / normalization
 *  Импорт и localStorage считаются недоверенным входом: приводим
 *  документ к безопасной форме, чинибельные значения — чиним,
 *  невалидные аллокации/людей — отбрасываем.
 * ============================================================ */
const SAFE_ID = /^[A-Za-z0-9_-]+$/;
const HEX6 = /^#[0-9a-fA-F]{6}$/;
const asStr = (v,def="")=> typeof v==="string" ? v : (v==null ? def : String(v));
// уникальные непустые строки (trim до дедупа — как UI add/rename; дубли справочников запрещены)
const uniqStrings = (arr)=> [...new Set((Array.isArray(arr)?arr:[]).filter(v=>typeof v==="string").map(v=>v.trim()).filter(Boolean))];
// календарно валидная дата ISO (не только формат): «2026-99-99» → false
function validDateISO(s){
  if(!/^\d{4}-\d{2}-\d{2}$/.test(s)) return false;
  const d = new Date(`${s}T00:00:00Z`);
  return !Number.isNaN(d.getTime()) && d.toISOString().slice(0,10)===s;
}

function normalizeDoc(input){
  const src = (input && typeof input==="object") ? input : {};
  const roles     = uniqStrings(src.roles);
  const locations = uniqStrings(src.locations);
  const projects  = uniqStrings(src.projects);   // справочник проектов для ставок
  // цвета ролей: только валидные hex6
  const roleColors = {};
  if(src.roleColors && typeof src.roleColors==="object"){
    for(const k in src.roleColors){ if(HEX6.test(asStr(src.roleColors[k]))) roleColors[k]=src.roleColors[k]; }
  }

  // команды: безопасный И уникальный id (иначе регенерация + ремап аллокаций), валидный цвет
  const idMap = new Map();         // старый небезопасный id → новый (для ремапа аллокаций)
  const seenTeam = new Set();
  const freshId = (pfx, seen)=>{ let id; do{ id=uid(pfx); }while(seen.has(id)); return id; };
  const teams = (Array.isArray(src.teams)?src.teams:[]).map(t=>{
    t = t||{};
    let id = asStr(t.id);
    if(!SAFE_ID.test(id)){ const nid=freshId("t",seenTeam); if(id) idMap.set(id,nid); id=nid; }
    else if(seenTeam.has(id)){ id = freshId("t",seenTeam); }   // дубликат безопасного id → новый
    seenTeam.add(id);
    return { id, name: asStr(t.name,"Команда")||"Команда",
             color: HEX6.test(asStr(t.color)) ? t.color : "#4f8cff" };
  });
  const validTeam = new Set(teams.map(t=>t.id));
  // дубликат «tA» → первый сохраняет id, аллокации на «tA» уходят к первому; ремап только небезопасных
  const remap = id => idMap.has(id) ? idMap.get(id) : id;

  // люди: уникальный id, грейд клампится, у подрядчиков null; аллокации только на существующие команды с fte>0
  const seenPerson = new Set();
  const people = (Array.isArray(src.people)?src.people:[]).map(p=>{
    p = p||{};
    let id = asStr(p.id);
    if(!SAFE_ID.test(id) || seenPerson.has(id)) id = freshId("p",seenPerson);
    seenPerson.add(id);
    const isVacancy = !!p.isVacancy;
    const isContractor = isVacancy ? false : !!p.isContractor;  // ставка всегда штатная
    // грейд: у подрядчика null; у ставки опционален (пусто → null); у штатного — клампится (дефолт GRADE_MIN)
    let grade = null;
    if(!isContractor){
      const raw = p.grade;
      if(raw==null || raw===""){ grade = isVacancy ? null : GRADE_MIN; }
      else { const n=parseInt(raw,10); grade = isNaN(n) ? (isVacancy?null:GRADE_MIN) : Math.min(GRADE_MAX,Math.max(GRADE_MIN,n)); }
    }
    // проект/срок — атрибуты ставки (позиции), применимы и к пустой ставке, и к занятой сотрудником.
    // срок: только календарно валидная дата ISO; проект: только из справочника (иначе очищается).
    const rawExpiry = asStr(p.expiry).trim();
    const expiry = validDateISO(rawExpiry) ? rawExpiry : "";
    const pr = asStr(p.project).trim();
    const project = pr && projects.includes(pr) ? pr : "";
    const allocations = (Array.isArray(p.allocations)?p.allocations:[])
      .map(a=>({ teamId: remap(asStr(a && a.teamId)), fte: Math.max(0, parseFloat(a && a.fte)||0) }))
      .filter(a=> a.fte>0 && validTeam.has(a.teamId));
    return { id, name: isVacancy ? "" : (asStr(p.name,"Без имени")||"Без имени"),
             role: asStr(p.role).trim(), grade, isContractor, isVacancy,
             location: isVacancy ? "" : asStr(p.location).trim(),
             project, expiry, comment: asStr(p.comment),
             tags: normTags(p.tags), allocations };
  }).filter(p=> p.allocations.length>0);   // люди без валидных аллокаций отбрасываются

  const meta = (src.meta && typeof src.meta==="object")
    ? { name: asStr(src.meta.name,"Кластер")||"Кластер", version:1 }
    : { name:"Кластер", version:1 };
  return { meta, roles, roleColors, locations, projects, teams, people };
}

function normalizeSnapshots(arr){
  if(!Array.isArray(arr)) return [];
  const seen = new Set();
  return arr.map(s=>{
    s = s||{};
    let id = asStr(s.id);
    if(!SAFE_ID.test(id) || seen.has(id)){ do{ id=uid("s"); }while(seen.has(id)); }
    seen.add(id);
    return { id, name: asStr(s.name,"Снимок")||"Снимок", createdAt: asStr(s.createdAt),
             doc: normalizeDoc(s.doc) };
  });
}

/* ============================================================ *
 *  Persistence
 * ============================================================ */
function persist(){
  try{
    localStorage.setItem(LS_KEY, JSON.stringify({state,snapshots,baselineId,ui:{hideGrades:ui.hideGrades},uidCounter}));
  }catch(e){ /* квота/приватный режим — игнорируем, JSON-экспорт всё равно доступен */ }
}
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const d=JSON.parse(raw);
      uidCounter = d.uidCounter||1;
      state = normalizeDoc(d.state);
      snapshots = normalizeSnapshots(d.snapshots);
      baselineId = snapshots.some(s=>s.id===d.baselineId) ? d.baselineId : null;
      if(d.ui && typeof d.ui==="object") ui.hideGrades = !!d.ui.hideGrades;
      return; }
  }catch(e){}
  state = seed();
}

/* ============================================================ *
 *  History (undo/redo) — снимок документа state
 * ============================================================ */
function pushHistory(){
  history = history.slice(0,hpos+1);
  history.push(clone(state));
  if(history.length>60) history.shift();
  hpos = history.length-1;
}
function commit(){ pushHistory(); persist(); render(); }
function undo(){ if(hpos>0){ hpos--; state=clone(history[hpos]); persist(); render(); toast("Отменено"); } }
function redo(){ if(hpos<history.length-1){ hpos++; state=clone(history[hpos]); persist(); render(); toast("Повторено"); } }

/* ============================================================ *
 *  Metrics & balance
 * ============================================================ */
function teamMetrics(teamId, doc=state){
  let fte=0, head=0, gradeW=0, gradeFte=0, contrFte=0, vacancies=0, vacancyFte=0;
  const locs={};
  for(const p of doc.people){
    for(const a of p.allocations){
      if(a.teamId!==teamId) continue;
      if(p.isVacancy){ vacancies++; vacancyFte+=a.fte; continue; } // ставки (вакансии) — отдельно, не в укомплектованности
      fte+=a.fte; head++;
      if(p.isContractor) contrFte+=a.fte;
      else if(p.grade!=null){ gradeW+=p.grade*a.fte; gradeFte+=a.fte; }
      locs[p.location||"—"]=(locs[p.location||"—"]||0)+a.fte;
    }
  }
  return {
    fte, head, gradeFte, vacancies, vacancyFte,
    avgGrade: gradeFte>0 ? gradeW/gradeFte : null,
    contrShare: fte>0 ? contrFte/fte : 0,
    locs
  };
}
// статистика по кластеру для сравнения команд
function clusterStats(doc=state){
  const per = doc.teams.map(t=>({t, m:teamMetrics(t.id,doc)}));
  const grades = per.filter(x=>x.m.avgGrade!=null).map(x=>x.m.avgGrade);
  const shares = per.map(x=>x.m.contrShare);
  const ftes = per.map(x=>x.m.fte);
  const mean=a=>a.length?a.reduce((s,v)=>s+v,0)/a.length:0;
  const std=a=>{ if(a.length<2) return 0; const m=mean(a);
    return Math.sqrt(a.reduce((s,v)=>s+(v-m)**2,0)/a.length); };
  return {
    per,
    grade:{mean:mean(grades),std:std(grades)},
    share:{mean:mean(shares),std:std(shares)},
    fte:{mean:mean(ftes),std:std(ftes)},
    totalFte: ftes.reduce((s,v)=>s+v,0),
    totalHead: doc.people.filter(p=>!p.isVacancy).length,
    contractors: doc.people.filter(p=>p.isContractor && !p.isVacancy).length,
    vacancies: doc.people.filter(p=>p.isVacancy).length,
  };
}
function zFlag(val, ref){
  if(val==null || ref.std===0) return {z:0, level:"good"};
  const z=Math.abs((val-ref.mean)/ref.std);
  return {z, level: z>Z_BAD?"bad": z>Z_WARN?"warn":"good"};
}
const flagColor = l => l==="bad"?"var(--bad)":l==="warn"?"var(--warn)":"var(--good)";

/* ============================================================ *
 *  Rendering
 * ============================================================ */
function matchFilter(p){
  if(ui.fRole && p.role!==ui.fRole) return false;
  if(ui.fLoc && p.location!==ui.fLoc) return false;
  if(ui.fStatus==="staff" && (p.isContractor || p.isVacancy)) return false; // «штат» — только реальные штатные
  if(ui.fStatus==="contractor" && !p.isContractor) return false;
  if(ui.fStatus==="vacancy" && !p.isVacancy) return false;
  if(ui.search){
    const q=ui.search.toLowerCase();
    // поиск по имени, роли, проекту, тегам и слову «вакансия» (комментарий намеренно не ищем — он скрыт с доски)
    const hay=[p.name, p.role, p.project, p.isVacancy?"вакансия":"", ...(p.tags||[])].join(" ").toLowerCase();
    if(!hay.includes(q)) return false;
  }
  return true;
}
function anyFilterActive(){ return ui.search||ui.fRole||ui.fLoc||ui.fStatus; }

// карта перемещений относительно baseline: personId -> Set(teamId) в базе
function baselineAlloc(){
  const snap = snapshots.find(s=>s.id===baselineId);
  if(!snap) return null;
  const map=new Map();
  for(const p of snap.doc.people) map.set(p.id, new Set(p.allocations.map(a=>a.teamId)));
  return map;
}

function render(){
  // справочники в фильтры
  fillSelect($("#filterRole"), state.roles, ui.fRole, "Все роли");
  fillSelect($("#filterLoc"), state.locations, ui.fLoc, "Все локации");
  $("#filterStatus").value = ui.fStatus;
  $("#searchInput").value = ui.search;
  $("#filterMode").checked = ui.fHide;
  $("#projName").value = state.meta.name||"";
  // кнопка «глаз»: иконка + активное состояние
  $("#gradeEye").innerHTML = `<span class="icon">${ui.hideGrades?"🙈":"👁"}</span>`;
  $("#gradeEye").classList.toggle("primary", ui.hideGrades);

  // compare UI
  const base = snapshots.find(s=>s.id===baselineId);
  $("#compareWrap").style.display = base ? "inline-flex":"none";
  if(base){ $("#baselineName").textContent = base.name; $("#compareToggle").checked = ui.compare; }
  const baseMap = (ui.compare && base) ? baselineAlloc() : null;
  const baseStatsByTeam = (ui.compare && base) ? Object.fromEntries(
    base.doc.teams.map(t=>[t.id, teamMetrics(t.id, base.doc)])) : null;

  $("#undo").disabled = hpos<=0;
  $("#redo").disabled = hpos>=history.length-1;

  const stats = clusterStats();
  renderAnalytics(stats);

  const board = $("#board"); board.innerHTML="";
  for(const team of state.teams){
    board.appendChild(renderTeam(team, stats, baseMap, baseStatsByTeam));
  }
}

function fillSelect(sel, items, val, allLabel){
  const cur = val;
  sel.innerHTML = `<option value="">${allLabel}</option>` +
    items.map(r=>`<option ${r===cur?"selected":""}>${esc(r)}</option>`).join("");
  sel.value = cur||"";
}

function renderAnalytics(stats){
  const avgAll = (()=>{ let w=0,f=0; for(const x of stats.per){ if(x.m.avgGrade!=null){w+=x.m.avgGrade*x.m.gradeFte;f+=x.m.gradeFte;} } return f?w/f:null; })();
  const contrPct = stats.totalFte? Math.round(stats.per.reduce((s,x)=>s+x.m.contrShare*x.m.fte,0)/stats.totalFte*100):0;
  // локации по кластеру (вакансии без локации не учитываем)
  const locAgg={};
  for(const p of state.people){ if(p.isVacancy) continue; for(const a of p.allocations){ const l=p.location||"—"; locAgg[l]=(locAgg[l]||0)+a.fte; } }
  const locTop = Object.entries(locAgg).sort((a,b)=>b[1]-a[1]);
  const totFte = Object.values(locAgg).reduce((s,v)=>s+v,0)||1;
  const palette=["#4f8cff","#6ee7b7","#e0a516","#a855f7","#e5484d","#22d3ee","#f472b6"];

  // ставки (вакансии): обычные / проектные / временные (категории «с проектом» и «со сроком» могут пересекаться)
  const vac = state.people.filter(p=>p.isVacancy);
  const vacProj = vac.filter(p=>p.project).length;
  const vacTemp = vac.filter(p=>p.expiry).length;
  const vacStd  = vac.filter(p=>!p.project && !p.expiry).length;

  // распределение по тегам (навыки), вакансии тоже учитываются
  const tagAgg={};
  for(const p of state.people){ for(const t of (p.tags||[])) tagAgg[t]=(tagAgg[t]||0)+1; }
  const tagTop = Object.entries(tagAgg).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const tagMax = tagTop.length ? tagTop[0][1] : 1;

  const unbalanced = stats.per.filter(x=>zFlag(x.m.avgGrade,stats.grade).level!=="good"||zFlag(x.m.contrShare,stats.share).level!=="good").length;

  $("#anHint").textContent = `${state.teams.length} команд · ${stats.totalHead} человек · ${stats.vacancies} ставок`;
  $("#analyticsBody").innerHTML = `
    <div class="stat"><div class="k">Средний грейд</div>
      <div class="v">${avgAll!=null?avgAll.toFixed(1):"—"}</div>
      <div class="sub">взвеш. по FTE, штат</div></div>
    <div class="stat"><div class="k">Доля подрядчиков</div>
      <div class="v">${contrPct}%</div>
      <div class="sub">${stats.contractors} из ${stats.totalHead} чел.</div></div>
    <div class="stat"><div class="k">Суммарный FTE</div>
      <div class="v">${stats.totalFte.toFixed(1)}</div>
      <div class="sub">средн. ${(stats.totalFte/Math.max(1,state.teams.length)).toFixed(1)} на команду</div></div>
    <div class="stat"><div class="k">Несбалансированные команды</div>
      <div class="v">${unbalanced}<span class="hint" style="font-size:13px"> из ${state.teams.length}</span></div>
      <div class="sub">сильное отклонение среднего грейда или доли подрядчиков от среднего по кластеру</div></div>
    <div class="stat"><div class="k">Открытые ставки</div>
      <div class="v">${vac.length}</div>
      <div class="sub">обычных ${vacStd} · проектных ${vacProj} · временных ${vacTemp}</div></div>
    <div class="stat"><div class="k">Команд / людей</div>
      <div class="v">${state.teams.length}<span class="hint" style="font-size:13px"> / ${stats.totalHead}</span></div>
      <div class="sub">штат+подрядчики, без ставок</div></div>
    <div class="stat" style="grid-column:span 2"><div class="k">Распределение по локациям (FTE)</div>
      ${locTop.length? locTop.map((l,i)=>`<div class="barrow"><span class="lbl" title="${esc(l[0])}">${esc(l[0])}</span>
        <span class="track"><span class="fill" style="width:${(l[1]/totFte*100).toFixed(0)}%;background:${palette[i%palette.length]}"></span></span>
        <span class="hint">${l[1].toFixed(1)}</span></div>`).join("") : '<div class="sub">нет данных</div>'}
    </div>
    <div class="stat" style="grid-column:span 2"><div class="k">Топ тегов (навыки)</div>
      ${tagTop.length? tagTop.map((t,i)=>`<div class="barrow"><span class="lbl" title="${esc(t[0])}">${esc(t[0])}</span>
        <span class="track"><span class="fill" style="width:${(t[1]/tagMax*100).toFixed(0)}%;background:${palette[i%palette.length]}"></span></span>
        <span class="hint">${t[1]}</span></div>`).join("") : '<div class="sub">тегов нет</div>'}
    </div>`;
}

function renderTeam(team, stats, baseMap, baseStats){
  const m = teamMetrics(team.id);
  const gf = zFlag(m.avgGrade, stats.grade);
  const sf = zFlag(m.contrShare, stats.share);

  const el = document.createElement("div");
  el.className="team"; el.dataset.teamId=team.id;

  // --- diff strip ---
  let diff="";
  if(baseStats && baseStats[team.id]){
    const bm=baseStats[team.id];
    const dG = (m.avgGrade!=null&&bm.avgGrade!=null)? m.avgGrade-bm.avgGrade : null;
    const dF = m.fte-bm.fte;
    const fmt=(v,inv)=>{ if(v==null) return ""; const cls=(inv? v<0:v>0)?"up":(v===0?"":"down");
      const sign=v>0?"+":""; return `<span class="delta ${v===0?"":cls}">${sign}${v.toFixed(1)}</span>`; };
    diff = `<div class="diff-strip">vs база: грейд ${dG!=null?fmt(dG):"—"} · FTE ${fmt(dF)}</div>`;
  }

  el.innerHTML = `
    <div class="thead">
      <div class="top">
        <span class="team-grip" data-teamdrag draggable="true" title="Перетащите, чтобы изменить порядок команд">⠿</span>
        <span class="team-color" style="background:${team.color||'#4f8cff'}"></span>
        <h2><input value="${esc(team.name)}" data-rename></h2>
        <button class="btn sm ghost" data-delteam title="Удалить команду">✕</button>
      </div>
      <div class="metrics">
        <div class="metric"><div class="ml">Средн. грейд</div>
          <div class="mv">${m.avgGrade!=null?m.avgGrade.toFixed(1):"—"}
            <span class="flagdot" style="background:${flagColor(gf.level)}" title="отклонение от кластера"></span></div>
          <div class="accentbar" style="background:${flagColor(gf.level)}"></div></div>
        <div class="metric"><div class="ml">Подрядчики</div>
          <div class="mv">${Math.round(m.contrShare*100)}%
            <span class="flagdot" style="background:${flagColor(sf.level)}"></span></div>
          <div class="accentbar" style="background:${flagColor(sf.level)}"></div></div>
        <div class="metric"><div class="ml">FTE / чел.</div>
          <div class="mv">${m.fte.toFixed(1)}<span class="hint" style="font-size:12px">/${m.head}</span></div></div>
      </div>
      ${m.vacancies>0 ? `<div class="vac-strip" title="Открытые штатные ставки (вакансии)">🪧 Открытые ставки: <b>${m.vacancies}</b> · ${m.vacancyFte.toFixed(1)} FTE</div>` : ""}
      ${diff}
    </div>
    <div class="members" data-drop></div>
    <div class="tfoot"><button class="btn sm ghost" data-addhere><span class="icon">＋</span>Добавить в команду</button></div>
  `;

  // --- members grouped by role ---
  const box = $(".members", el);
  const here = [];
  for(const p of state.people)
    for(const a of p.allocations)
      if(a.teamId===team.id) here.push({p,a});

  if(here.length===0){
    box.innerHTML = `<div class="empty-team">Перетащите сюда участников<br>или нажмите «Добавить в команду»</div>`;
  } else {
    // порядок ролей как в справочнике, затем прочие
    const order = new Map(state.roles.map((r,i)=>[r,i]));
    const groups = {};
    for(const x of here){ const r=x.p.role||"(без роли)"; (groups[r]=groups[r]||[]).push(x); }
    const roleKeys = Object.keys(groups).sort((a,b)=>(order.has(a)?order.get(a):99)-(order.has(b)?order.get(b):99));
    for(const r of roleKeys){
      const g=document.createElement("div"); g.className="role-group";
      const gFte=groups[r].reduce((s,x)=>s+x.a.fte,0);
      g.innerHTML=`<div class="role-h">${esc(r)}<span class="count">${groups[r].length} · ${gFte.toFixed(1)} FTE</span>
        <button class="btn sm ghost addrole" data-addrole="${esc(r)}" title="Добавить ${esc(r)}">＋</button></div>`;
      for(const x of groups[r]) g.appendChild(renderChip(x.p,x.a,team.id,baseMap));
      box.appendChild(g);
    }
  }
  return el;
}

function renderChip(p, alloc, teamId, baseMap){
  const c=document.createElement("div");
  c.className="chip"+(p.isContractor?" contractor":"")+(p.isVacancy?" vacancy":"");
  c.draggable=true;
  c.dataset.personId=p.id; c.dataset.teamId=teamId;

  // filter dim/hit
  if(anyFilterActive()){
    if(matchFilter(p)){ if(!ui.fHide) c.classList.add("hit"); }
    else { c.classList.add("dim"); if(ui.fHide) c.style.display="none"; }
  }
  // compare highlight
  if(baseMap){
    const was = baseMap.get(p.id);
    if(!was || !was.has(teamId)) c.classList.add("moved-in");
  }

  const gradeText = p.grade ?? (p.isVacancy ? "—" : "?");
  const gradeBox = p.isContractor
    ? `<div class="grade" title="Подрядчик">ПД</div>`
    : ui.hideGrades
      ? `<div class="grade masked" style="background:${roleColor(p.role)}" title="Грейд скрыт">•••</div>`
      : `<div class="grade" style="background:${roleColor(p.role)}" title="Грейд · ${esc(p.role||'—')}">${gradeText}</div>`;
  const fteBadge = alloc.fte<1 ? `<span class="fte" title="Доля занятости">${alloc.fte.toFixed(2).replace(/\.?0+$/,"")} FTE</span>`:"";
  const contrBadge = p.isContractor ? `<span class="badge contr">подряд</span>`:"";
  const tagsRow = (p.tags && p.tags.length)
    ? `<div class="tags">${p.tags.map(t=>`<span class="tag-pill">${esc(t)}</span>`).join("")}</div>` : "";

  // чипсы проекта/срока — атрибуты ставки, показываем и у вакансии, и у занятой сотрудником позиции
  const posChips = [
    p.project ? `<span class="pos-chip proj" title="Проект ставки: ${esc(p.project)}">▣ ${esc(p.project)}</span>` : "",
    p.expiry  ? `<span class="pos-chip temp" title="Срок действия ставки: ${esc(p.expiry)}">⏳ до ${esc(p.expiry)}</span>` : ""
  ].join("");
  const posRow = posChips ? `<div class="pos-chips">${posChips}</div>` : "";
  let nameHtml, metaHtml;
  if(p.isVacancy){
    nameHtml = `<span class="vac-name">Вакансия</span>`;
    metaHtml = esc(p.role||"—");
  } else {
    nameHtml = `${esc(p.name)} ${contrBadge}`;
    metaHtml = `${esc(p.role||"—")} · ${esc(p.location||"—")}`;
  }

  c.innerHTML = `${gradeBox}
    <div class="nm"><div class="name">${nameHtml}</div>
      <div class="meta">${metaHtml}</div>${posRow}${tagsRow}</div>
    ${fteBadge}
    <button class="edit" data-edit title="Редактировать">✎</button>`;
  return c;
}

/* ============================================================ *
 *  Drag & Drop — перенос аллокации целиком
 * ============================================================ */
let dragData=null;     // перенос участника (chip)
let teamDrag=null;     // перенос команды (смена порядка)
document.addEventListener("dragstart",e=>{
  // приоритет — грип команды
  const grip=e.target.closest?.("[data-teamdrag]");
  if(grip){ const team=grip.closest(".team");
    teamDrag={teamId:team.dataset.teamId}; team.classList.add("team-dragging");
    e.dataTransfer.effectAllowed="move"; try{e.dataTransfer.setData("text/plain",team.dataset.teamId);}catch(_){}
    return; }
  const chip=e.target.closest?.(".chip"); if(!chip) return;
  dragData={personId:chip.dataset.personId, fromTeamId:chip.dataset.teamId};
  chip.classList.add("dragging");
  e.dataTransfer.effectAllowed="move";
  try{e.dataTransfer.setData("text/plain",chip.dataset.personId);}catch(_){}
});
document.addEventListener("dragend",e=>{
  e.target.closest?.(".chip")?.classList.remove("dragging");
  $$(".team.team-dragging").forEach(t=>t.classList.remove("team-dragging"));
  dragData=null; teamDrag=null;
});
document.addEventListener("dragover",e=>{
  const team=e.target.closest?.(".team"); if(!team||(!dragData&&!teamDrag)) return;
  e.preventDefault(); team.classList.add("dragover");
});
document.addEventListener("dragleave",e=>{
  const team=e.target.closest?.(".team"); if(team && !team.contains(e.relatedTarget)) team.classList.remove("dragover");
});
document.addEventListener("drop",e=>{
  const team=e.target.closest?.(".team"); if(!team) return;
  e.preventDefault(); team.classList.remove("dragover");
  if(teamDrag){ reorderTeam(teamDrag.teamId, team.dataset.teamId); return; }
  if(!dragData) return;
  const toTeamId=team.dataset.teamId;
  if(toTeamId===dragData.fromTeamId) return;
  moveAllocation(dragData.personId, dragData.fromTeamId, toTeamId);
});

// смена порядка команд: перетаскиваемая команда вставляется на позицию целевой
function reorderTeam(fromId, toId){
  if(fromId===toId) return;
  const arr=state.teams;
  const fromIdx=arr.findIndex(t=>t.id===fromId);
  if(fromIdx<0) return;
  const [moved]=arr.splice(fromIdx,1);
  const toIdx=arr.findIndex(t=>t.id===toId);
  if(toIdx<0){ arr.splice(fromIdx,0,moved); return; } // защита: вернуть на место
  arr.splice(toIdx,0,moved);
  commit();
}

// удаление команды с подтверждением, если есть участники ИЛИ открытые ставки (V6-F1)
function deleteTeamById(id){
  const m=teamMetrics(id);
  if(m.head>0 || m.vacancies>0){
    const parts=[];
    if(m.head>0) parts.push(`участников: ${m.head}`);
    if(m.vacancies>0) parts.push(`открытых ставок: ${m.vacancies} (${m.vacancyFte.toFixed(1)} FTE)`);
    if(!confirm(`Удалить команду? ${parts.join(", ")}. Их аллокации в этой команде будут сняты.`)) return false;
  }
  state.teams=state.teams.filter(t=>t.id!==id);
  for(const p of state.people) p.allocations=p.allocations.filter(a=>a.teamId!==id);
  state.people=state.people.filter(p=>p.allocations.length>0); // осиротевших (вкл. ставки) убираем
  return true;
}

function moveAllocation(personId, fromTeamId, toTeamId){
  const p=state.people.find(x=>x.id===personId); if(!p) return;
  const a=p.allocations.find(x=>x.teamId===fromTeamId); if(!a) return;
  const existing=p.allocations.find(x=>x.teamId===toTeamId);
  if(existing){ existing.fte=Math.round((existing.fte+a.fte)*100)/100;
    p.allocations=p.allocations.filter(x=>x!==a); }
  else { a.teamId=toTeamId; }
  commit();
}

/* ============================================================ *
 *  Modals
 * ============================================================ */
function openModal(html){
  const root=$("#modalRoot");
  root.innerHTML=`<div class="overlay">${html}</div>`;
  const ov=$(".overlay",root);
  ov.addEventListener("mousedown",e=>{ if(e.target===ov) closeModal(); });
  return root;
}
function closeModal(){ $("#modalRoot").innerHTML=""; }
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

/* ----- person editor ----- */
function personModal(person, defaultTeamId, defaultRole){
  const isNew=!person;
  const p = person ? clone(person) : {
    id:uid("p"), name:"", role:defaultRole||state.roles[0]||"", grade:9, isContractor:false, isVacancy:false,
    location:state.locations[0]||"", tags:[], comment:"", project:"", expiry:"",
    allocations: defaultTeamId?[{teamId:defaultTeamId,fte:1}]:[]
  };
  const roleOpts=state.roles.map(r=>`<option ${r===p.role?"selected":""}>${esc(r)}</option>`).join("");
  const locOpts=state.locations.map(r=>`<option ${r===p.location?"selected":""}>${esc(r)}</option>`).join("");
  const projOpts=`<option value="">— без проекта —</option>`+(state.projects||[]).map(pr=>`<option ${pr===p.project?"selected":""}>${esc(pr)}</option>`).join("");
  const teamOpt=(sel)=>state.teams.map(t=>`<option value="${t.id}" ${t.id===sel?"selected":""}>${esc(t.name)}</option>`).join("");

  const allocRows = (allocs)=>allocs.map((a,i)=>`
    <div class="alloc-row" data-arow>
      <select data-ateam>${teamOpt(a.teamId)}</select>
      <input type="number" data-afte min="0" max="1" step="0.1" value="${a.fte}">
      <button class="btn sm ghost" data-adel title="Убрать">✕</button>
    </div>`).join("");

  openModal(`<div class="modal">
    <h3><span class="icon">👤</span>${isNew?"Новый сотрудник / ставка":"Редактирование"}</h3>
    <div class="content">
      <label class="vac-check"><input type="checkbox" id="m_vacancy" ${p.isVacancy?'checked':''}>
        <b>Пустая ставка</b> (вакансия) — позиция без сотрудника (имя не указывается)</label>
      <div class="field" id="m_name_field"><label>Имя / идентификатор</label>
        <input id="m_name" value="${esc(p.name)}" placeholder="Фамилия Имя"></div>
      <div class="row">
        <div class="field" id="m_status_field"><label>Статус</label>
          <div class="seg" id="m_status">
            <button data-st="staff" class="${p.isContractor?'':'on'}">Штат</button>
            <button data-st="contractor" class="${p.isContractor?'on':''}">Подрядчик</button>
          </div></div>
        <div class="field"><label>Грейд<span class="hint" id="m_grade_opt"></span></label>
          <input id="m_grade" type="number" min="${GRADE_MIN}" max="${GRADE_MAX}" value="${p.grade??''}"
            ${p.isContractor?'disabled':''}></div>
      </div>
      <div class="row">
        <div class="field"><label>Роль</label><select id="m_role">${roleOpts}</select></div>
        <div class="field" id="m_loc_field"><label>Локация</label><select id="m_loc">${locOpts}</select></div>
      </div>
      <div class="row" id="m_pos_field">
        <div class="field"><label>Проект ставки (опционально)</label><select id="m_project">${projOpts}</select></div>
        <div class="field"><label>Срок действия ставки (временная)</label>
          <input id="m_expiry" type="date" value="${esc(p.expiry||'')}"></div>
      </div>
      <div class="field"><label>Теги — уникальные навыки (через запятую; до ${MAX_TAGS} шт., по ${MAX_TAG_LEN} симв.)</label>
        <input id="m_tags" value="${esc((p.tags||[]).join(', '))}" placeholder="напр. Kafka, Tech Lead"></div>
      <div class="field"><label>Комментарий (виден только в карточке при редактировании, не на доске)</label>
        <textarea id="m_comment" rows="2" placeholder="заметка о сотруднике/ставке">${esc(p.comment||'')}</textarea></div>
      <div class="field"><label>Аллокации по командам (доли FTE)</label>
        <div class="listmgr" id="m_allocs">${allocRows(p.allocations)}</div>
        <button class="btn sm" id="m_addalloc" style="align-self:flex-start;margin-top:4px">＋ команда</button>
        <span class="hint" id="m_allocsum"></span>
      </div>
    </div>
    <div class="foot">
      ${isNew?"":`<button class="btn ghost" id="m_delete" style="margin-right:auto;color:var(--bad)">Удалить</button>`}
      <button class="btn ghost" onclick="closeModal()">Отмена</button>
      <button class="btn primary" id="m_save">Сохранить</button>
    </div></div>`);

  const upSum=()=>{ const sum=$$("#m_allocs [data-afte]").reduce((s,i)=>s+(parseFloat(i.value)||0),0);
    const el=$("#m_allocsum"); const over=sum>1.0001;
    el.textContent=`Суммарный FTE: ${sum.toFixed(2)}` + (over?" ⚠ больше 1.0 (перегрузка)":"");
    el.style.color = over ? "var(--warn)" : "var(--muted)"; };
  upSum();

  // status toggle
  $$("#m_status button").forEach(b=>b.onclick=()=>{
    $$("#m_status button").forEach(x=>x.classList.remove("on")); b.classList.add("on");
    p.isContractor = b.dataset.st==="contractor";
    $("#m_grade").disabled=p.isContractor; if(p.isContractor) $("#m_grade").value="";
    else if(!$("#m_grade").value) $("#m_grade").value=9;
  });
  // vacancy (ставка) toggle: прячем имя/статус/локацию, показываем проект+срок; ставка всегда штатная
  const applyVacancy=()=>{
    const v=$("#m_vacancy").checked;
    // пустая ставка прячет имя/статус/локацию; проект и срок видны всегда (атрибуты ставки)
    $("#m_name_field").style.display = v?"none":"";
    $("#m_status_field").style.display = v?"none":"";
    $("#m_loc_field").style.display = v?"none":"";
    $("#m_grade_opt").textContent = v?" — опционально":"";
    if(v){ p.isContractor=false; $("#m_grade").disabled=false;
      $$("#m_status button").forEach(x=>x.classList.toggle("on", x.dataset.st==="staff")); }
  };
  $("#m_vacancy").onchange=applyVacancy;
  applyVacancy();
  $("#m_addalloc").onclick=()=>{
    const div=document.createElement("div"); div.className="alloc-row"; div.setAttribute("data-arow","");
    div.innerHTML=`<select data-ateam>${teamOpt(state.teams[0]?.id)}</select>
      <input type="number" data-afte min="0" max="1" step="0.1" value="0.5">
      <button class="btn sm ghost" data-adel>✕</button>`;
    $("#m_allocs").appendChild(div); bindAllocs(); upSum();
  };
  function bindAllocs(){
    $$("#m_allocs [data-adel]").forEach(b=>b.onclick=()=>{ b.closest("[data-arow]").remove(); upSum(); });
    $$("#m_allocs [data-afte]").forEach(i=>i.oninput=upSum);
  }
  bindAllocs();

  if(!isNew) $("#m_delete").onclick=()=>{
    state.people=state.people.filter(x=>x.id!==p.id); commit(); closeModal(); toast("Сотрудник удалён");
  };

  $("#m_save").onclick=()=>{
    p.isVacancy=$("#m_vacancy").checked;
    p.role=$("#m_role").value;
    p.tags=normTags($("#m_tags").value.split(","));
    p.comment=$("#m_comment").value;
    // проект/срок — атрибуты ставки, сохраняются и у вакансии, и у занятой позиции
    p.project=$("#m_project").value; p.expiry=$("#m_expiry").value||"";
    if(p.isVacancy){
      p.isContractor=false; p.name=""; p.location="";
      const gv=$("#m_grade").value; p.grade = gv==="" ? null : clampGrade(gv);
    } else {
      p.name=$("#m_name").value.trim()||"Без имени"; p.location=$("#m_loc").value;
      p.grade = p.isContractor ? null : clampGrade($("#m_grade").value);
    }
    p.allocations = $$("#m_allocs [data-arow]").map(r=>({
      teamId:$("[data-ateam]",r).value, fte:Math.max(0,parseFloat($("[data-afte]",r).value)||0)
    })).filter(a=>a.fte>0);
    if(p.allocations.length===0){ toast("Добавьте хотя бы одну аллокацию"); return; }
    if(isNew) state.people.push(p);
    else { const idx=state.people.findIndex(x=>x.id===p.id); state.people[idx]=p; }
    commit(); closeModal();
  };
}
function clampGrade(v){ const n=parseInt(v,10); if(isNaN(n)) return GRADE_MIN; return Math.min(GRADE_MAX,Math.max(GRADE_MIN,n)); }

/* ----- settings (roles / locations / teams) ----- */
function settingsModal(){
  const listMgr=(items,key)=>items.map((it,i)=>`
    <div class="item" data-ditem="${key}:${i}">
      <input value="${esc(it)}" data-edit="${key}:${i}">
      <button class="btn sm ghost" data-up="${key}:${i}">↑</button>
      <button class="btn sm ghost" data-down="${key}:${i}">↓</button>
      <button class="btn sm ghost" data-rm="${key}:${i}" style="color:var(--bad)">✕</button>
    </div>`).join("");

  openModal(`<div class="modal wide">
    <h3><span class="icon">⚙</span>Справочники</h3>
    <div class="content">
      <div class="row" style="align-items:flex-start">
        <div class="field"><label>Роли и цвет квадрата грейда</label>
          <div class="listmgr" id="s_roles">${state.roles.map((r,i)=>`
            <div class="item">
              <input type="color" value="${roleColor(r)}" data-rolecolor="${i}" style="width:30px;height:28px;padding:2px;flex:none" title="Цвет квадрата грейда для роли">
              <input value="${esc(r)}" data-roleedit="${i}">
              <button class="btn sm ghost" data-roleup="${i}">↑</button>
              <button class="btn sm ghost" data-roledown="${i}">↓</button>
              <button class="btn sm ghost" data-rolerm="${i}" style="color:var(--bad)">✕</button>
            </div>`).join("")}</div>
          <div style="display:flex;gap:6px;margin-top:6px">
            <input class="f" id="s_newrole" placeholder="Новая роль" style="flex:1">
            <button class="btn sm" data-add="roles">Добавить</button></div></div>
        <div class="field"><label>Локации</label>
          <div class="listmgr" id="s_locations">${listMgr(state.locations,"locations")}</div>
          <div style="display:flex;gap:6px;margin-top:6px">
            <input class="f" id="s_newloc" placeholder="Новая локация" style="flex:1">
            <button class="btn sm" data-add="locations">Добавить</button></div></div>
      </div>
      <div class="field"><label>Проекты (для типа ставки)</label>
        <div class="listmgr" id="s_projects">${listMgr(state.projects||[],"projects")}</div>
        <div style="display:flex;gap:6px;margin-top:6px">
          <input class="f" id="s_newproj" placeholder="Новый проект" style="flex:1">
          <button class="btn sm" data-add="projects">Добавить</button></div></div>
      <div class="field"><label>Команды (${state.teams.length})</label>
        <div class="listmgr" id="s_teams">
          ${state.teams.map(t=>`<div class="item">
            <span class="team-color" style="background:${t.color||'#4f8cff'}"></span>
            <input value="${esc(t.name)}" data-tname="${t.id}">
            <input type="color" value="${t.color||'#4f8cff'}" data-tcolor="${t.id}" style="width:34px;padding:2px;flex:none">
            <button class="btn sm ghost" data-trm="${t.id}" style="color:var(--bad)">✕</button></div>`).join("")}
        </div>
        <button class="btn sm" id="s_addteam" style="align-self:flex-start;margin-top:6px">＋ команда</button></div>
      <span class="hint">Изменения применяются сразу. Цвет роли красит квадрат грейда на доске. Переименование роли/локации мигрирует сотрудников и переносит цвет роли (дубли запрещены); удаление не трогает сотрудников — у них останется прежнее значение.</span>
    </div>
    <div class="foot"><button class="btn primary" onclick="closeModal()">Готово</button></div></div>`);

  const rebind=()=>settingsModal(); // перерисовать после структурных изменений

  // add to roles/locations/projects
  if(!state.projects) state.projects=[];
  const newInp={roles:"#s_newrole",locations:"#s_newloc",projects:"#s_newproj"};
  $$("[data-add]").forEach(b=>b.onclick=()=>{
    const key=b.dataset.add; const inp=$(newInp[key]);
    const v=inp.value.trim(); if(!v) return;
    if(!state[key].includes(v)) state[key].push(v); commit(); rebind();
  });
  // edit inline locations/projects: настоящее переименование (миграция сотрудников/ставок) + запрет дублей
  $$("[data-edit]").forEach(inp=>inp.onchange=()=>{
    const [key,i]=inp.dataset.edit.split(":"); const idx=+i; const old=state[key][idx]; const nv=inp.value.trim();
    if(!nv || nv===old){ inp.value=old; return; }
    if(state[key].some((v,j)=>j!==idx && v===nv)){ toast(`«${nv}» уже есть в справочнике`); inp.value=old; return; }
    state[key][idx]=nv;
    if(key==="locations"){ for(const p of state.people){ if(p.location===old) p.location=nv; } }
    if(key==="projects"){ for(const p of state.people){ if(p.project===old) p.project=nv; } }
    commit();
  });
  // roles: цвет применяется только на change (единая undo-точка; промежуточные input не мутируют state)
  $$("[data-rolecolor]").forEach(inp=>inp.onchange=()=>{
    const r=state.roles[+inp.dataset.rolecolor]; state.roleColors=state.roleColors||{};
    state.roleColors[r]=inp.value; commit();
  });
  $$("[data-roleedit]").forEach(inp=>inp.onchange=()=>{
    const i=+inp.dataset.roleedit, old=state.roles[i], nv=inp.value.trim();
    if(!nv || nv===old){ inp.value=old; return; }
    if(state.roles.some((r,j)=>j!==i && r===nv)){ toast(`Роль «${nv}» уже существует`); inp.value=old; return; }
    // настоящее переименование: переносим цвет И мигрируем сотрудников
    if(state.roleColors && state.roleColors[old]!=null){ state.roleColors[nv]=state.roleColors[old]; delete state.roleColors[old]; }
    for(const p of state.people){ if(p.role===old) p.role=nv; }
    state.roles[i]=nv;
    commit(); rebind(); });
  $$("[data-roleup]").forEach(b=>b.onclick=()=>{ const a=+b.dataset.roleup; if(a>0){ [state.roles[a-1],state.roles[a]]=[state.roles[a],state.roles[a-1]]; commit(); rebind(); } });
  $$("[data-roledown]").forEach(b=>b.onclick=()=>{ const a=+b.dataset.roledown; if(a<state.roles.length-1){ [state.roles[a+1],state.roles[a]]=[state.roles[a],state.roles[a+1]]; commit(); rebind(); } });
  $$("[data-rolerm]").forEach(b=>b.onclick=()=>{ const i=+b.dataset.rolerm, r=state.roles[i]; state.roles.splice(i,1); if(state.roleColors) delete state.roleColors[r]; commit(); rebind(); });
  $$("[data-rm]").forEach(b=>b.onclick=()=>{ const [key,i]=b.dataset.rm.split(":"); const removed=state[key][+i]; state[key].splice(+i,1);
    // строгая модель проектов (V6-F2): удаление проекта снимает его со ставок, чтобы не было «несправочных» ссылок
    if(key==="projects"){ for(const p of state.people){ if(p.project===removed) p.project=""; } }
    commit(); rebind(); });
  $$("[data-up]").forEach(b=>b.onclick=()=>{ const [key,i]=b.dataset.up.split(":"); const a=+i; if(a>0){ [state[key][a-1],state[key][a]]=[state[key][a],state[key][a-1]]; commit(); rebind(); } });
  $$("[data-down]").forEach(b=>b.onclick=()=>{ const [key,i]=b.dataset.down.split(":"); const a=+i; if(a<state[key].length-1){ [state[key][a+1],state[key][a]]=[state[key][a],state[key][a+1]]; commit(); rebind(); } });

  // teams
  $$("[data-tname]").forEach(inp=>inp.onchange=()=>{ const t=state.teams.find(x=>x.id===inp.dataset.tname); t.name=inp.value.trim()||t.name; commit(); });
  $$("[data-tcolor]").forEach(inp=>inp.oninput=()=>{ const t=state.teams.find(x=>x.id===inp.dataset.tcolor); t.color=inp.value; commit(); });
  $$("[data-trm]").forEach(b=>b.onclick=()=>{
    if(deleteTeamById(b.dataset.trm)){ commit(); rebind(); }
  });
  $("#s_addteam").onclick=()=>{
    const palette=["#4f8cff","#6ee7b7","#e0a516","#a855f7","#e5484d","#22d3ee","#f472b6","#34d399"];
    state.teams.push({id:uid("t"),name:`Команда ${state.teams.length+1}`,color:palette[state.teams.length%palette.length]});
    commit(); rebind();
  };
}

/* ----- snapshots ----- */
function snapshotModal(){
  const items = snapshots.length? snapshots.map(s=>`
    <div class="snap-item ${s.id===baselineId?'baseline':''}">
      <div class="si-main"><div class="nm">${esc(s.name)} ${s.id===baselineId?'<span class="tag">база</span>':''}</div>
        <div class="dt">${esc(s.createdAt)} · ${s.doc.teams.length} команд · ${s.doc.people.length} чел.</div></div>
      <button class="btn sm" data-base="${s.id}">${s.id===baselineId?'снять базу':'сделать базой'}</button>
      <button class="btn sm" data-restore="${s.id}">восстановить</button>
      <button class="btn sm ghost" data-export="${s.id}">⬇</button>
      <button class="btn sm ghost" data-delsnap="${s.id}" style="color:var(--bad)">✕</button>
    </div>`).join("") : `<div class="hint">Снимков пока нет. Сохраните текущее состояние как базу (as-is), затем экспериментируйте с перестановками и сравнивайте.</div>`;

  openModal(`<div class="modal wide">
    <h3><span class="icon">⧉</span>Снимки и сравнение (as-is / to-be)</h3>
    <div class="content">
      <div style="display:flex;gap:8px">
        <input class="f" id="snap_name" placeholder="Название снимка, напр. «Базовое состояние»" style="flex:1">
        <button class="btn primary" id="snap_save">Сохранить текущее</button></div>
      <div class="listmgr">${items}</div>
      <span class="hint">«Сделать базой» + галочка «сравнить с базой» в верхней панели подсветит, кто куда переехал, и покажет дельты грейда/FTE по командам.</span>
    </div>
    <div class="foot"><button class="btn primary" onclick="closeModal()">Закрыть</button></div></div>`);

  $("#snap_save").onclick=()=>{
    const name=$("#snap_name").value.trim()||`Снимок ${snapshots.length+1}`;
    snapshots.push({id:uid("s"),name,createdAt:nowStr(),doc:clone(state)});
    persist(); snapshotModal(); toast("Снимок сохранён");
  };
  $$("[data-base]").forEach(b=>b.onclick=()=>{ baselineId = baselineId===b.dataset.base?null:b.dataset.base; if(!baselineId) ui.compare=false; persist(); snapshotModal(); render(); });
  $$("[data-restore]").forEach(b=>b.onclick=()=>{ const s=snapshots.find(x=>x.id===b.dataset.restore);
    if(confirm(`Восстановить состояние «${s.name}»? Текущее будет заменено (можно отменить через Ctrl+Z).`)){ state=clone(s.doc); commit(); closeModal(); toast("Состояние восстановлено"); } });
  $$("[data-export]").forEach(b=>b.onclick=()=>{ const s=snapshots.find(x=>x.id===b.dataset.export); downloadJSON(s.doc, `snapshot-${s.name}`); });
  $$("[data-delsnap]").forEach(b=>b.onclick=()=>{ const id=b.dataset.delsnap; snapshots=snapshots.filter(s=>s.id!==id); if(baselineId===id){baselineId=null;ui.compare=false;} persist(); snapshotModal(); render(); });
}
function nowStr(){ const d=new Date(); const p=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }

/* ============================================================ *
 *  Import / Export
 * ============================================================ */
function downloadJSON(obj, name){
  const blob=new Blob([JSON.stringify(obj,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=`${name}.json`; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function exportAll(){ downloadJSON({state,snapshots,baselineId,version:1}, (state.meta.name||"team-balancer").replace(/\s+/g,"_")); }
function importFile(file){
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      let doc, snaps=[], base=null;
      if(d && typeof d==="object" && d.state){ doc=d.state; snaps=d.snapshots; base=d.baselineId; }
      else if(d && typeof d==="object" && (d.teams||d.people)){ doc=d; } // «голый» документ
      else throw 0;
      // подсчёт отброшенного для сводки пользователю
      const rawPeople = Array.isArray(doc.people)?doc.people.length:0;
      state = normalizeDoc(doc);
      snapshots = normalizeSnapshots(snaps);
      baselineId = snapshots.some(s=>s.id===base) ? base : null;
      ui.compare=false;
      history=[]; hpos=-1; pushHistory(); persist(); render();
      const dropped = rawPeople - state.people.length;
      toast(`Данные загружены: ${state.teams.length} команд, ${state.people.length} чел.` +
            (dropped>0 ? ` (отброшено записей: ${dropped})` : ""));
    }catch(e){ toast("Не удалось прочитать файл"); }
  };
  r.readAsText(file);
}

/* ----- PNG export (best-effort, SVG foreignObject; fallback → print) ----- */
async function exportPNG(){
  try{
    const node=$("#board");
    const w=node.scrollWidth, h=node.scrollHeight;
    const cssText=[...document.styleSheets].map(ss=>{ try{return [...ss.cssRules].map(r=>r.cssText).join("\n");}catch(_){return"";} }).join("\n");
    const xhtml=new XMLSerializer().serializeToString(node);
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}">
      <foreignObject width="100%" height="100%">
        <div xmlns="http://www.w3.org/1999/xhtml" style="background:#0f1420;padding:14px;width:${w}px">
          <style>${cssText}</style>${xhtml}
        </div></foreignObject></svg>`;
    const img=new Image();
    const blob=new Blob([svg],{type:"image/svg+xml;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    await new Promise((res,rej)=>{ img.onload=res; img.onerror=rej; img.src=url; });
    const scale=2, cv=document.createElement("canvas");
    cv.width=w*scale; cv.height=h*scale; const ctx=cv.getContext("2d");
    ctx.fillStyle="#0f1420"; ctx.fillRect(0,0,cv.width,cv.height); ctx.scale(scale,scale);
    ctx.drawImage(img,0,0); URL.revokeObjectURL(url);
    cv.toBlob(b=>{ if(!b) throw 0; const a=document.createElement("a");
      a.href=URL.createObjectURL(b); a.download=`${(state.meta.name||"board").replace(/\s+/g,"_")}.png`; a.click(); });
    toast("PNG сохранён");
  }catch(e){
    toast("PNG не вышел — открываю печать (можно сохранить в PDF)");
    setTimeout(()=>window.print(),400);
  }
}

/* ============================================================ *
 *  Toast
 * ============================================================ */
let toastT=null;
function toast(msg){
  const r=$("#toastRoot"); r.innerHTML=`<div class="toast">${esc(msg)}</div>`;
  clearTimeout(toastT); toastT=setTimeout(()=>r.innerHTML="",2200);
}

 * ============================================================ */

$("#addTeam").onclick=()=>{
  const palette=["#4f8cff","#6ee7b7","#e0a516","#a855f7","#e5484d","#22d3ee","#f472b6"];

// делегирование кликов по доске
$("#board").addEventListener("click",e=>{
  const chip=e.target.closest("[data-edit]");
  if(chip){ const c=e.target.closest(".chip"); const p=state.people.find(x=>x.id===c.dataset.personId); personModal(p); return; }
  const addHere=e.target.closest("[data-addhere]");
  if(addHere){ const t=e.target.closest(".team"); personModal(null,t.dataset.teamId); return; }
  const addRole=e.target.closest("[data-addrole]");
  if(addRole){ const t=e.target.closest(".team");
    quickAdd(t.dataset.teamId, addRole.dataset.addrole); return; }
  const delTeam=e.target.closest("[data-delteam]");
  if(delTeam){ const t=e.target.closest(".team");
    if(deleteTeamById(t.dataset.teamId)) commit(); return; }
});
$("#board").addEventListener("change",e=>{
  const rn=e.target.closest("[data-rename]");
  if(rn){ const t=state.teams.find(x=>x.id===e.target.closest(".team").dataset.teamId);
    t.name=rn.value.trim()||t.name; commit(); }
});
function quickAdd(teamId, role){ personModal(null, teamId, role); }

document.addEventListener("keydown",e=>{
  if(e.target.matches("input,select,textarea")) return;
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="z"){ e.preventDefault(); undo(); }
  if((e.ctrlKey||e.metaKey)&&(e.key.toLowerCase()==="y"||(e.shiftKey&&e.key.toLowerCase()==="z"))){ e.preventDefault(); redo(); }
});

/* ============================================================ *
 *  Boot
 * ============================================================ */
load();
pushHistory();
render();
window.closeModal=closeModal; // для inline onclick
</script>
